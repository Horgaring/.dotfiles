general {
    lock_cmd = pidof hyprlock || hyprlock       # команда для блокировки
    before_sleep_cmd = loginctl lock-session    # залочить перед сном
    after_sleep_cmd = hyprctl dispatch dpms on  # включить монитор после сна
}

listener {
    timeout = 300                                # 5 минут
    on-timeout = loginctl lock-session           # заблокировать экран
}

listener {
    timeout = 330                                # 5.5 минут
    on-timeout = hyprctl dispatch dpms off       # выключить монитор
    on-resume = hyprctl dispatch dpms on         # включить при движении мыши
}

